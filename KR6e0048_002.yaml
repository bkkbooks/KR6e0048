body:
  text: 西天中印度摩伽陀國那爛陀寺傳教大師三藏賜紫沙門臣法天奉詔譯爾時法慧菩薩摩訶薩為諸菩薩説是菩薩十住法已于時十方以佛神力於一一方各有十千佛剎微塵等世界一一佛剎微塵等世界地皆六種震動所謂動遍動等遍動震遍震等遍震擊遍擊等遍擊涌遍涌等遍涌吼遍吼等遍吼起遍起等遍起是時以佛神力復雨種種天華雲種種天香雲種種天塗香雲種種天鬘雲種種天粖香雲種種天衣雲種種天傘蓋雲種種天寶雲種種天妙蓮華雲種種天諸瓔珞雲種種天莊嚴雲如是等種種供養雲周匝遍雨復有種種天妙音樂於虛空中不鼓自鳴出大音聲光明晃曜遍四大洲妙高鐵圍周遍十方普皆供養是時法慧菩薩説是法時一切十方世界同時亦説此十住法故乃至文字句義不增不減皆悉同等復以佛威神力故於一一十千佛剎微塵等世界各各有十千佛剎微塵等菩薩從於十方雲集而來告法慧菩薩言佛子善哉善哉佛子如汝所説菩薩十住法佛子與我名同説法亦同如是等一切同名法慧菩薩從彼十方一切如來所而來至此彼法雲世界以佛威德於一切處同時轉此法輪如是種種性相文字句義不增不減佛子于時衆會以佛威德皆見彼衆而來詣此如我到此世界亦復如是於一切十方世界一切四大洲妙高山頂帝釋宮中十千佛剎微塵等菩薩亦同來集是時法慧菩薩承佛威力觀察十方法界衆會欲重宣此義而説偈言見諸如來清淨智巍巍變化力如是十力功德衆莊嚴是故發此菩提心見此種種神通力説法利益諸群生復見輪回諸苦惱是故發此菩提心於此普賢如來前得聞一切功德海由如虛空無有相是故發此菩提心一切住處及所生一一性行皆明了各各差別性智求是故發此菩提心是時過去及現在乃至未來衆善惡為求此智善修習是故發此菩提心禪定解脫及三昧等持清淨悉皆然為求此智恭敬彼是故發此菩提心能遍世間諸根力如如湛淨皆同等為求此智彼義學是故發此菩提心菩提解脫遍世間其中各有種種意為求此智無數論是故發此菩提心種種無數三界中於中復有種種界界之自性智應求是故發此菩提心遍詣一切求此法如是依止得安樂自性真實解了知是故發此菩提心一切剎中而出生由如衆生依地有無數智眼同此求是故發此菩提心過去現在及未來若干衆生何性相如是過去事皆知是故發此菩提心積聚衆生滿世間乃至一一遍親近如是煩惱盡能知是故發此菩提心三界智慧彼皆知無盡法門能解了為求如是真實智是故發此菩提心一切諸法無依倚本性如空亦無著為求勝義真實知是故發此菩提心能動佛剎微塵數亦令江海涌沸騰為求如來如是智是故發此菩提心普放光明照十方一一光明從口出為求彼智一光明是故發此菩提心不可思議種種剎飲食供給珍玩具我願亦具如彼智是故發此菩提心一切衆生及佛剎能令遠離傷殺生為求此法壽延長是故發此菩提心假使大海所有水一毛滴數盡能知如是此智願當求是故發此菩提心十方所有一切剎一一剎中微塵數如是此智要盡知是故發此菩提心過去及與未來劫現在一切諸世間如是劫數要盡知是故發此菩提心三世一切諸如來及以聲聞辟支佛法之自性悉皆知是故發此菩提心無量無數諸世界一毛端中盡稱量性之自性悉能知是故發此菩提心不可思議輪圍界一毛端量盡能稱為此廣大微妙知是故發此菩提心無量無數諸世間一剎那間聲周遍為求此智清淨聲是故發此菩提心一切世間諸語言一字演説盡無餘為此自性真實知是故發此菩提心無數化導三界中一切衆生悉皆衛為求辨説廣大舌是故發此菩提心如説一切諸佛剎一剎那中悉能見為求説法無礙智是故發此菩提心如來所有一切剎一剎那中皆周遍如此佛法真實知是故發此菩提心無數微塵等世界皆從自性而出生為求如是種種智是故發此菩提心過去及與未來佛乃至現在諸世間一剎那中心盡知是故發此菩提心一句所説不思議如是劫盡彼無盡為求如是語言知是故發此菩提心八方一切諸世間如是相續不斷絶為此自性心了知是故發此菩提心所有身口意三業作彼十方一切行因此能解三世空是故發此菩提心菩提心發應如是殷勤最上奉諸佛十方無數劫盡行是故尊重心不退乃至世間一切尊八方各各皆周遍如是彼佛皆説法一一尊重心不退若一菩薩獲安樂行彼行故免輪回能作世間圓滿相是故此尊心不退最上妙法最殊特甚深難解離言説彼諸菩薩妙敷揚為敬彼尊心不退世間不動及住處如是難得甚希有演説清淨妙法音是故此尊心不退得生一切如來中無我無人離憍慢為求此法常在前是故殷勤心不退無數無等阿僧祇得諸如來三摩地行彼菩薩如是行是故殷勤心不退乃至究竟三摩地超生彼岸解了知如是説彼諸佛法是故此尊心不退遠離輪回三界中轉於如是妙法輪於諸世間常無間菩薩應當如是説一切世間諸苦惱如是濁惡災難中憐愍一切諸有情是故菩薩應當説菩薩最初説此法因茲發起菩提心持戒説法無有時是故名為發心住是時菩薩治地住最初降伏如是心安樂利益於世間如佛遠離老病死信心念心及精進慧心願心并持戒護法捨離無去來決定回向諸含識若以住彼如是心讀誦受持大乘典遠離喧囂居間靜訪尋一切親善友善言親近善知識勤求如是真實智了達一切諸語言勝義諦理亦如是曉了如來勝義已離諸顛倒無疑惑如是平等湛然安是名説法真佛子治地住中如是得善能觀察諸菩薩演説妙法奉諸佛是故佛子應當學復次菩薩第三住法王教中求佛行苦空無常悉了知一切自性無來去諸法本寂離自性明了通達決定心住此一切無有惑佛子應當如是説為知一切衆生界及闡一切諸法界如是世界悉盡知是故名為相應行地界水界及火界如是風界虛空界欲界色界無色界是諸世界悉盡知乃至差別諸世界悉見法界自性體如是廣大智慧尊勇猛精進求佛智是時菩薩生貴住出家生諸如來中有性無性心決定所生之處常正見此地菩薩無退轉為求佛道心無厭於一切法恆修習觀諸衆生如自性世間衆罪如塵剎遠離輪回諸果報佛子善能分別生菩薩悉令離衰老過去現在及未來一切法智皆明了宿殖善友悉同生如佛出世亦復爾一切如來殊妙好入彼三世平等意能作如是上妙生超越三世種種行此名第四菩薩住彼能稱讚此妙色是法悉能解了知覺彼菩薩如是生此後菩薩稱第五説名方便具足住種種方便化群生樂求福業遍往詣所作如是廣大福令諸衆生皆解脫盡心回向悉獲安憐愍有情令離繫世間患難皆救濟攝伏令彼生歡喜各各引導諸衆生得大涅槃心寂靜無邊一切諸世間如是無量無有數過諸稱量無等倫非性非相非究竟此為菩薩第五住具足方便化群生彼佛如是妙圓明示現一切諸功德無邊一切諸衆生觀法自性無迷惑疑網有無智了知天上人間能堅固於佛於法菩薩中常行妙行離諸色於是廣大諸衆生聽聞演説方便法煩惱衆生使清淨易化難化悉調伏法界或廣略敷揚非來非去絶諸相法界體性非有無菩薩三世樂聽受觀察一切心無動如是專注於佛法泯絶性相孰有無本性離染我亦爾曉了劫性如幻夢為聞如是上妙法不退菩薩應如是於佛於法菩薩中并觀行相為有無不退非有亦非無如來非去非有住亦無來與非不來生與不生盡不盡有相無相非一異種種衆多彼如一勝義諦理離有無各各差別衆寶嚴菩薩於彼心不退真如妙相非有無以無相智能解了如是差別往集會一一天上悉聽聞復次菩薩童真住身口意業悉清淨施作佛事無有著是故隨意所生得皆從衆生行法生遊行見彼諸剎土智慧速疾隨意得十方殷勤恭敬禮菩薩於此無異心聞佛演暢微妙法能知剎土悉動搖如是盡知無有餘演説遊行於佛剎剎那遍詣阿僧祇隨問演説無數義自性差別性亦然方便音聲能照察無數佛剎一念中復説菩薩王子住密行衆生非測量煩惱障閉妄想除事理相應方便説種種妙行悉能行分別世間過未來真俗二諦能了知諦求如是微妙法善能方便入王城如是遍遊悉周匝於彼往還能自在所有王城能照察由如灌頂王妙法如是威德力亦然入彼王城善演説是故此為王子住此能隨順諸衆生如佛所化亦如是調御出興悉同然得佛安隱住王子佛子菩薩灌頂住處長最上能利他一毛滴水為校量思惟校計莫能測如是行於諸佛法由若一切微塵剎衆生莫測塵可知是故無數應是説一切如來及菩薩并與過去未來佛若以現在十方中乃至聲聞辟支佛從種發生菩提心如是此數莫能測功德數量莫能知最初一念菩提心如是世界化群生無能超越過於彼是時普賢菩薩摩訶薩告法慧菩薩言善男子善哉善哉汝今善説此寶光總持法門復次善男子彼諸衆生當得愛樂不可思議諸佛功德一切智慧善男子若有衆生但聞此寶光總持正法名號不須受持讀誦一心恭敬究竟決定得證佛果時法慧菩薩言佛子如是如是如汝所説普賢菩薩言佛子彼等已得如來灌頂甚深智慧若有善男子善女人至此會中得聞如是法者或有衆生手持是經者是諸衆生於佛法中皆得授記是時長老舍利弗從座而起頂禮佛足而白佛言世尊我等今者如生盲人從昔已來未曾見聞如是正法世尊非但我故若諸衆生不聞此法彼如是等一切衆生亦如生盲佛言長老如是如是如汝所説舍利弗即白佛言唯願説此不可思議甚深法故佛言舍利弗汝當往詣命彼梵王帝釋護世諸天同來此會如來敕語舍利弗此最勝法印寶光總持之法於彼道場衆會而説是時尊者舍利弗受佛教敕為問此寶光總持法門承佛聖旨往彼梵王帝釋護世諸天到已作如是言寶光道場佛待汝來同時聽受此如是法今正是時如來將説此寶光總持不可思議法故汝等速集勿過此時甚難得值後必追悔如是最勝法寶世間難得甚為希有時彼諸天聞是説已即運神通於剎那頃梵王帝釋護世諸天皆來集會到世尊所右繞三匝合掌恭敬住立佛前勸請世尊唯願如來哀愍我等及末法衆生説此寶光總持法門于時世尊默然不答時諸天衆梵王帝釋護世諸天如是三白殷勤勸請世尊默然是時尊者舍利弗白世尊言唯願如來説此寶光明總持法故復言善逝唯願説之是時世尊即於舌根從口而出種種音聲遍於三千大千世界同時得聞若有善男子為此寶光總持法故請於如來是諸衆生皆得不退轉於阿耨多羅三藐三菩提是時世尊復語尊者舍利弗言尊者舍利弗汝當往詣請妙吉祥童子説如是法時妙吉祥童子在於異處鉢攞二合叉娑羅樹下端身正念結跏趺坐過於百千萬俱胝那庾多日月光明住大寶莊嚴樓閣中梵王帝釋護世諸天圍繞恭敬身皆金色吉祥莊嚴光明照耀是時尊者舍利弗奉佛教命往詣妙吉祥童子所到已即白妙吉祥言善男子如來請汝為於我等説此寶光總持法故于時妙吉祥童子語尊者舍利弗言此如來者為何等義舍利弗言善男子汝智慧深遠我非汝曹是故不任與汝論議妙吉祥言止舍利弗汝甚愚癡汝若樂聞我當為説舍利弗言善男子我今樂聞惟願仁者廣為我説是時妙吉祥童子説是語時即時三千大千世界乃至清淨天宮及諸天衆上至阿迦膩吒天衆下至四大天王并諸眷屬無數俱胝大藥叉將諸梵天王及天帝釋護世諸天并諸天女各各樂聞如是大法皆來集會及諸比丘比丘尼優婆塞優婆夷并餘三十三天夜摩天覩史陀天化樂天他化自在天大梵天王阿迦膩吒天如是諸天衆等皆來集會復有諸大聲聞衆其名曰尊者須菩提尊者摩訶迦葉尊者大目乾連尊者舍利弗尊者摩訶迦旃延尊者阿𩕳嚕馱尊者誐耶迦葉尊者摩賀俱絺羅尊者祖拏判姹迦尊者梨嚩多尊者曩禰迦葉尊者烏嚕尾螺迦葉尊者布囉拏梅怛囉二合尼子尊者羅護羅尊者鈸捺囉二合波羅尊者麼澀波二合尊者阿難陀如是等諸大聲聞衆及耶輸陀羅五百比丘尼等皆悉來集復有轉輪王及諸小王剎帝利婆羅門長者居士皆來集會是時尊者舍利弗繞佛三匝而作是言世尊何因何緣即於今日如是大衆皆悉雲集云何當知佛言尊者舍利弗是寶光總持法威德力故舍利弗言世尊此寶光總持法門我今樂聞佛言尊者舍利弗汝當往詣請彼妙吉祥童子普賢菩薩此二大士必為汝説是時尊者舍利弗白妙吉祥童子言善男子汝今當説此寶光三摩地微妙法寶妙吉祥言尊者舍利弗汝等今者為欲聞此寶光總持法故舍利弗言今此四衆梵王帝釋護世諸天為聽是法故來至此于時妙吉祥即告長老舍利弗作如是言舍利弗此法祕要不可視聽如幻如化云何當説説聽是誰舍利弗言善男子汝今當説我欲樂聞妙吉祥問尊者舍利弗此説當云何言答言妙吉祥空作是説妙吉祥又問舍利弗空云何説答言妙吉祥空離言説妙吉祥言尊者舍利弗此空若離言説我云何説尊者舍利弗既一切諸法皆離言説若作是説誰能聽受長老舍利弗言善男子彼一切法皆離文字語言故作如是説是故説空無相無願非取非捨非異非不異非離戲論非不離戲論是時妙吉祥童子尊者舍利弗説是法時彼諸菩薩及於梵王帝釋護世諸天心大歡喜同聲讚言善哉善男子善説此寶光總持法故是時尊者須菩提白妙吉祥童子言善男子菩薩摩訶薩云何受持讀誦為他解説此寶光總持法故妙吉祥言須菩提此總持法無生清淨如理受持離性離相非離言説非取非捨此法應如是受持為他解説妙吉祥童子説是法時有九十二菩薩皆得勇猛三摩地復有人天六十二衆生得無生法忍爾時普賢菩薩摩訶薩從座而起偏袒右肩合掌恭敬白佛言世尊云何為菩薩摩訶薩大悲佛言善男子此菩薩摩訶薩大悲者若菩薩摩訶薩不捨三界名為大悲若令一切衆生得見諸佛淨妙剎土名為大悲若諸破戒衆生悉能憐愍護持名為大悲若能令一切衆生志求般若波羅蜜多親近修習名為大悲若為一切衆生不惜身命名為大悲乃至頭目髓腦難捨能捨難行能行為諸衆生名為大悲復告善男子菩薩摩訶薩為諸衆生無有異心等以安樂離諸邪見悉令解脫善男子是為菩薩摩訶薩大悲應如是解爾時普賢菩薩摩訶薩白佛言世尊唯願如來大慈無量為諸衆生安樂世間説此寶光總持法故并此大會諸天及人皆得安樂利益即時世尊愍諸衆生以梵音聲普告諸菩薩摩訶薩言汝等今者於未來世後五百歲法欲滅時誰能受持廣宣流布此寶光總持法故是時普賢菩薩離一切憂暗菩薩藥王菩薩辨積菩薩出生一切法王菩薩無盡意菩薩海慧菩薩寶師子菩薩寶賢菩薩寶光菩薩寶髻菩薩觀自在菩薩等觀菩薩常觀菩薩寶手菩薩寶積菩薩寶莊嚴菩薩吉祥幢菩薩法吉祥菩薩財吉祥菩薩福德吉祥菩薩栴檀吉祥菩薩法慧菩薩甘露慧菩薩不思議菩薩福德莊嚴菩薩功德莊嚴菩薩相嚴菩薩常歡喜根菩薩衆智山峯王菩薩辨説菩薩常舉手菩薩持地菩薩辨意菩薩虛空藏菩薩月藏菩薩清淨月藏菩薩日藏菩薩出生王菩薩摩訶彌盧菩薩堅牢慧菩薩彌勒菩薩摩訶薩如是等六十二百千俱胝那庾多菩薩摩訶薩以一音聲同時告言世尊我等今者能於未來世後五百歲法欲滅時常當受持廣宣流布為諸衆生説此寶光總持法門佛言善哉善哉善男子希有希有善男子汝等為諸衆生能發如是清淨大願爾時世尊告普賢菩薩摩訶薩言諦聽諦聽善男子此寶光總持微妙正法為欲利益安樂一切衆生爾時世尊説是語已即升大寶莊嚴師子之座結跏趺坐即説寶光明總持陀羅尼曰曩莫入三滿多跋捺囉二合引野冒引地薩怛嚩二合引野麼賀引薩怛嚩二合引野麼賀引迦引嚕抳迦引野怛儞也二合他引唵引婆引囉胝引婆囉胝引婆囉婆冷帝薩嚩二合引賀引是時世尊如是三説此寶光總持祕密微妙最上甚深廣大法寶是時普賢菩薩摩訶薩白佛言世尊法與法者是義云何佛言善男子無法即法即一切義即無性義一切法義即等虛空義一切法即無數義無數義即一切義無數義即一切法義普賢菩薩白佛言世尊云何説此一切法佛言善男子吾説此一切法者謂眼耳鼻舌身意如是此六識及十二緣行善男子是故我今作此説故一切諸法亦復如是復次善男子一切諸法本無生滅是時妙吉祥童子白普賢菩薩摩訶薩作如是言佛子此寶光總持法門菩薩云何受持普賢菩薩摩訶薩告妙吉祥如是説言善男子此寶光總持如法而説如理受持何故本性不生不滅故非相非空故無性即自性故自性即無性故善男子此寶光總持如是不應執著受持觀察故智慧決了應如是住分別解説善男子此寶光總持觀法自性義故
